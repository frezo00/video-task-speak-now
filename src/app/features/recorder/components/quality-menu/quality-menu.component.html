<ul class="quality-menu__list">
  @for (profile of tiers; track profile.tier) {
    <li>
      <button
        type="button"
        role="menuitemradio"
        class="quality-menu__row"
        [class.quality-menu__row--selected]="profile.tier === $selected()"
        [attr.aria-checked]="profile.tier === $selected()"
        (click)="select(profile.tier)"
      >
        <span class="quality-menu__label">{{ profile.label }}</span>
        @if (profile.tier === $selected()) {
          <svg class="quality-menu__check" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M6.2 11.6 2.6 8l1.4-1.4 2.2 2.2L12 3l1.4 1.4z" />
          </svg>
        }
      </button>
    </li>
  }
</ul>

<button type="button" class="quality-menu__close" aria-label="Close quality menu" (click)="close()">
  <i appIcon="close" appIconSize="small" aria-hidden="true"></i>
</button>
