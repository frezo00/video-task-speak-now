<main class="stage" aria-label="Video recorder" [attr.aria-busy]="$showSpinner()">
  @if ($showSpinner()) {
    <app-spinner label="Measuring bandwidth" />
  } @else {
    <app-video-preview [stream]="$stream()" />

    <button
      appQualityMenuTrigger
      #trigger="appQualityMenuTrigger"
      class="stage__settings"
      [selected]="$qualityTier()"
      [disabled]="$recorderStatus() !== 'idle'"
      [attr.aria-label]="trigger.$isOpen() ? 'Close quality menu' : 'Quality settings'"
      [attr.aria-expanded]="trigger.$isOpen()"
      (qualitySelected)="onQualitySelected($event)"
    >
      <i
        [appIcon]="trigger.$isOpen() ? 'close' : 'settings'"
        [appIconSize]="trigger.$isMobile() ? 'medium' : 'large'"
        aria-hidden="true"
      ></i>
    </button>

    <app-recorder-controls
      class="stage__controls"
      [status]="$recorderStatus()"
      [startedAt]="$recorderStartedAt()"
      (startRequested)="onStartRecording()"
      (stopRequested)="onStopRecording()"
    />

    @if ($isMobile()) {
      <button
        #drawerChip
        type="button"
        class="stage__drawer-chip"
        aria-controls="videos-drawer"
        [attr.aria-expanded]="$drawerOpen()"
        (click)="toggleDrawer()"
      >
        <i appIcon="video" aria-hidden="true"></i>
        {{ $videosCount() }}
      </button>
    }
  }
</main>

@if ($drawerActive()) {
  <div class="sidebar-backdrop" aria-hidden="true" (click)="closeDrawer()"></div>
}

<aside
  id="videos-drawer"
  class="sidebar"
  aria-label="Saved videos"
  tabindex="-1"
  [attr.role]="$isMobile() ? 'dialog' : null"
  [attr.aria-modal]="$drawerActive() ? 'true' : null"
  [class.sidebar--drawer]="$isMobile()"
  [class.sidebar--drawer-open]="$drawerActive()"
  [attr.inert]="$isMobile() && !$drawerOpen() ? '' : null"
  [cdkTrapFocus]="$drawerActive()"
  [cdkTrapFocusAutoCapture]="$drawerActive()"
  (keydown.escape)="closeDrawer()"
>
  <app-videos-list class="sidebar__list" />
</aside>
