<main class="stage" aria-label="Video recorder" [attr.aria-busy]="$showSpinner()">
  @if ($showSpinner()) {
    <app-spinner label="Measuring bandwidth" />
  } @else {
    <app-video-preview [stream]="$stream()" />

    <button
      #gearBtn
      type="button"
      class="stage__settings"
      [attr.aria-label]="$qualityMenuOpen() ? 'Close quality menu' : 'Quality settings'"
      aria-haspopup="menu"
      [attr.aria-expanded]="$qualityMenuOpen()"
      [disabled]="$recorderStatus() !== 'idle'"
      (click)="toggleQualityMenu()"
    >
      <i
        [appIcon]="$qualityMenuOpen() ? 'close' : 'settings'"
        appIconSize="xlarge"
        class="stage__settings-icon"
        aria-hidden="true"
      ></i>
    </button>

    <app-recorder-controls
      class="stage__controls"
      [status]="$recorderStatus()"
      [startedAt]="$recorderStartedAt()"
      (startRequested)="onStartRecording()"
      (stopRequested)="onStopRecording()"
    />
  }
</main>

<aside class="sidebar" aria-label="Saved videos">
  <app-videos-list class="sidebar__list" />
</aside>
