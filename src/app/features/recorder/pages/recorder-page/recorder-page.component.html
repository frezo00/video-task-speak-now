<main class="stage" aria-label="Video recorder">
  <app-video-preview [stream]="$stream()" />

  <button type="button" class="stage__settings" aria-label="Quality settings">
    <i appIcon="settings" appIconSize="xlarge" class="stage__settings-icon" aria-hidden="true"></i>
  </button>

  <div class="stage__pill" role="toolbar" aria-label="Recording controls">
    <button type="button" class="stage__record" aria-label="Start recording">
      <span class="stage__record-dot" aria-hidden="true"></span>
    </button>
  </div>
</main>

<aside class="sidebar" aria-label="Saved videos">
  <div class="sidebar__empty">
    <i appIcon="video" appIconSize="xlarge" class="sidebar__empty-icon" aria-hidden="true"></i>
    <p class="sidebar__empty-caption">There are no recorded videos yet.</p>
  </div>
</aside>
