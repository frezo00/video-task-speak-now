<button type="button" class="dialog-panel__close" aria-label="Close" (click)="dismiss()">
  <i appIcon="close" appIconSize="medium" aria-hidden="true"></i>
</button>

@if (data.icon; as icon) {
  <i [appIcon]="icon" appIconSize="large" class="dialog-panel__icon" aria-hidden="true"></i>
}

<h2 [id]="titleId" class="dialog-panel__title">{{ data.title }}</h2>

@if (data.body) {
  <p [id]="bodyId" class="dialog-panel__body">{{ data.body }}</p>
}

<div class="dialog-panel__actions">
  <button
    type="button"
    class="dialog-panel__button dialog-panel__button--ghost"
    (click)="dismiss()"
  >
    {{ data.dismissLabel }}
  </button>
  <button
    type="button"
    class="dialog-panel__button"
    [class.dialog-panel__button--primary]="!isDanger"
    [class.dialog-panel__button--danger]="isDanger"
    (click)="confirm()"
  >
    {{ data.confirmLabel }}
  </button>
</div>
